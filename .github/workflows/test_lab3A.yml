# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Raft Lab Test

on:
  push:
    branches: [ "master" ]

jobs:
  test3A:
    name: test Lab3A
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Test3A
      run: cd src/raft/ && chmod +x batch_test_3A.sh && ./batch_test_3A.sh

  test3B:
    name: test Lab3B
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Test3A
        run: cd src/raft/ && go test -run 3B
